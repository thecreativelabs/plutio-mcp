name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test — server boots and lists tools
        run: |
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/list"}\n' | \
            PLUTIO_CLIENT_ID=ci PLUTIO_CLIENT_SECRET=ci node dist/index.js > /tmp/out.jsonl 2> /tmp/err.log
          if ! grep -q '"plutio_api_reference"' /tmp/out.jsonl; then
            echo "Smoke test failed — no plutio_api_reference in output"
            cat /tmp/err.log
            exit 1
          fi
          echo "Smoke test passed"
